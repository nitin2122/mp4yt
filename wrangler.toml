# wrangler.toml
# Cloudflare Workers configuration for mp4yt.com

name = "mp4yt"
main = "worker.js"
compatibility_date = "2024-04-03"

[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true

[vars]
# Point this to your Vercel deployment URL (e.g., mp4yt.vercel.app)
# Do NOT point it to the final custom domain if that domain points to Cloudflare,
# otherwise it will create an infinite routing loop.
BACKEND_API_HOST = "mp4yt.vercel.app"
