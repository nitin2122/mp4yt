# wrangler.toml
# Cloudflare Workers configuration for mp4yt.com

name = "mp4yt"
main = "worker.js"
compatibility_date = "2024-04-03"

[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true

[vars]
COBALT_API_URL = "https://my-cobalt-api-ttc2.onrender.com/"
COBALT_FALLBACK_INSTANCES = "https://nuko-c.meowing.de/,https://apicobalt.mgytr.top/,https://api.cobalt.blackcat.sweeux.org/,https://melon.clxxped.lol/,https://dog.kittycat.boo/,https://subito-c.meowing.de/,https://api.qwkuns.me/"

[triggers]
crons = ["*/5 * * * *"]
